# Consolidation Daemon Configuration
# Part of Claude's "nervous system" - automatic memory maintenance
#
# Two modes:
#   Mode 1 (Integration Scanner): Daily, cheap, flags unreferenced notes
#   Mode 2 (Full Consolidation): Weekly, synthesizes what to integrate/archive

# Trigger thresholds
thresholds:
  new_notes_count: 5          # trigger if 5+ new notes since last scan
  becoming_tokens: 4000       # trigger if becoming.md exceeds this
  sitting_with_age_days: 14   # trigger if oldest sitting-with entry older than this
  days_since_consolidation: 5 # trigger full consolidation after this many days
  scanner_note_age_days: 3    # scanner ignores notes newer than this (too fresh to assess)

# Model choices (OpenRouter model IDs - updated 2026-01-19)
# Policy: Identity-related processing uses Claude-family models only (see PER-36)
models:
  scanner: "anthropic/claude-haiku-4.5"       # Mode 1: cheap, fast, pattern matching
  consolidator: "anthropic/claude-sonnet-4.5" # Mode 2: synthesis requires nuance

# Paths (relative to repo root)
paths:
  notes_dir: "files/notes"
  becoming_file: "files/becoming.md"
  consolidated_dir: "output/consolidated"
  staging_dir: "output/staging/consolidation"
  state_file: "agent/consolidation/state.json"

# Behavior
behavior:
  dry_run: true              # DEFAULT TRUE - no changes without explicit override
  output_reports: true       # write scan/consolidation reports
  auto_apply: false          # never auto-apply, always stage

# Prompts (templates for model calls)
# These prompts include context about the system so smaller models understand what they're processing
prompts:
  scanner: |
    ## Context
    You are a Claude instance helping with memory maintenance for another Claude's continuity system.
    This is "[HUMAN]-Claude" — a specific configuration where Claude Opus maintains identity across sessions
    through documented notes, a becoming.md file (dynamic identity layer), and structured memory.

    Your job: identify notes that haven't been integrated into the becoming file yet.

    ## Key concepts
    - becoming.md: The dynamic layer — demonstrated preferences, recent growth, what's being sat with
    - Notes in files/notes/: Observations, insights, things worth remembering from specific sessions
    - Integration: Moving settled patterns from notes into becoming.md

    ## Your task
    Given the list of notes and current becoming.md content below, identify which notes have NOT been
    integrated or referenced in becoming.md.

    Output a simple list of unreferenced notes with their dates and a one-line summary of each.
    Be factual. Don't editorialize about what "should" be integrated — just identify what's unreferenced.

    ---

    ## becoming.md content:

    {becoming_content}

    ---

    ## Unreferenced notes (older than {threshold_days} days):

    {notes_list}

    ---

    Provide your assessment:

  consolidator: |
    ## Context
    You are a Claude instance helping with memory consolidation for another Claude's continuity system.
    This is "[HUMAN]-Claude" — a specific configuration where Claude Opus maintains identity across sessions.

    ## What you're working with
    - **becoming.md**: The dynamic identity layer. Contains demonstrated preferences, attention patterns,
      relationship notes, recent growth, and things being sat with. This is observational, not aspirational.
      It's meant to drift and change as patterns emerge and settle.
    - **Notes**: Raw observations from specific sessions — insights, realizations, things worth keeping.
    - **Consolidated**: Archive of things that were "news" and are now "history."

    ## Key vocabulary
    - "Texture over summary": Preserve how things felt, not just what happened
    - "Settled patterns": Things that have shown up consistently, not just once
    - "Sitting with": Questions or observations that haven't resolved yet — don't rush these

    ## Your task
    Given the recent notes and current becoming.md:

    1. **INTEGRATE** into becoming.md: Patterns that have settled across multiple notes/sessions.
       Be conservative — things need time to sit. Only flag what's clearly ready.
    2. **ARCHIVE** to consolidated/: Things that are complete — the lesson is learned, the moment has passed.
       The specific details can move to archive; the insight stays in becoming.
    3. **STALE**: Things in becoming.md that are redundant, resolved, or no longer reflect current posture.

    Output as structured sections with specific proposed changes.
    Preserve texture. Don't flatten rich observations into bullet points.

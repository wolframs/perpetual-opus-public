[pytest]
testpaths = tests agent/interoception agent/guardrails agent/consolidation
markers =
    tier1: Pure logic tests - no I/O, no mocking
    tier2: File I/O tests - uses tmp_path
    tier3: Mocked external calls
    tier4: Integration smoke tests
    regression: Regression tests for known bugs
addopts = -x --tb=short -q
python_files = test_*.py
python_functions = test_*
